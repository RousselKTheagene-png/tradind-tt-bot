# Default bot configuration
mode: paper              # paper | live
base_currency: USD
loop_interval_seconds: 60

markets:
  crypto:
    enabled: true
    exchange: binance
    symbols: [BTC/USDT, ETH/USDT, SOL/USDT]
    timeframe: 1h
  stocks:
    enabled: false
    broker: alpaca
    symbols: [SPY, AAPL, NVDA]
    timeframe: 15m
  forex:
    enabled: false
    broker: oanda
    symbols: [EUR_USD, GBP_USD, USD_JPY]
    timeframe: 15m

strategies:
  - name: ema_crossover
    enabled: true
    params:
      fast: 20
      slow: 50
  - name: rsi_reversion
    enabled: true
    params:
      period: 14
      oversold: 30
      overbought: 70
  - name: bollinger_squeeze
    enabled: false
    params:
      period: 20
      num_std: 2.0
      squeeze_lookback: 50
      squeeze_percentile: 0.25
      squeeze_bars: 10
  - name: macd_divergence
    enabled: false
    params:
      fast: 12
      slow: 26
      signal: 9
      lookback: 60
      pivot_order: 3
  - name: donchian_breakout
    enabled: false
    params:
      entry_period: 20

risk:
  max_risk_per_trade_pct: 1.0
  max_daily_loss_pct: 3.0
  max_open_positions: 5
  max_drawdown_pct: 15.0
  default_stop_loss_pct: 2.0
  default_take_profit_pct: 4.0

regime:
  enabled: true
  method: rules           # rules | kmeans
  adx_threshold: 25.0

monitoring:
  log_level: INFO
  journal_path: ./journal/trades.jsonl
